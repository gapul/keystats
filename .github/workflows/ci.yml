name: CI

# push(main) と PR でビルド + テストを実行。
# macOS 専用(AppKit / Carbon / sqlite3 に依存)なので macos ランナーを使う。

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "VERSION"
      - "icon/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15   # Swift 6(Package.swift の swift-tools-version:6.0 に合わせる)
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6)
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (release)
        run: swift build -c release
